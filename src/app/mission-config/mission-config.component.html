<div class="text-white">
  <mat-stepper color="warn" class="example-stepper bg-[#8A8A8A]">
    <mat-step label="Einsatzzeit">
      <p>Hier kommt Text rein</p>
      <button class="bg-[#00d003] text-xl" mat-button matStepperNext>Nächste <img class="inline-block" src="..\assets\icons\arrow_forward_FILL0_wght300_GRAD0_opsz48.svg" alt="Next"></button>
    </mat-step>
    <mat-step label="Einsatzort">
      <button class="bg-[#00d003] text-xl" mat-button matStepperNext>Nächste <img class="inline-block" src="..\assets\icons\arrow_forward_FILL0_wght300_GRAD0_opsz48.svg" alt="Next"></button>
    </mat-step>
    <mat-step label="Überwachung">
      <button class="bg-[#00d003] text-xl" mat-button matStepperNext>Nächste <img class="inline-block" src="..\assets\icons\arrow_forward_FILL0_wght300_GRAD0_opsz48.svg" alt="Next"></button>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Weiteres</ng-template>
      <p>You are now done.</p>
      <div>
        <button class="bg-[#00d003] text-xl" mat-button matStepperPrevious>Fertig <img class="inline-block" src="..\assets\icons\done_FILL0_wght300_GRAD0_opsz48.svg" alt="Done"></button>
      </div>
    </mat-step>
  </mat-stepper>
</div>
