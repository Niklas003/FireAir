<h1 class="text-6xl">Einsatzdetails</h1>
<div class="mb-6">
  <form [style.fontSize.px]="20" [formGroup]="missionForm">
    <mat-form-field appearance="fill" class="w-2/6">
      <mat-label>Art</mat-label>
      <input type="text"
             matInput
             required
             [matAutocomplete]="autoGroup">
        <mat-autocomplete #autoGroup="matAutocomplete">
          <mat-optgroup *ngFor="let group of missionGroupOptions | async" [label]="group.letter">
            <mat-option *ngFor="let name of group.names" [value]="name">
              {{name}}
            </mat-option>
        </mat-optgroup>
      </mat-autocomplete>
    </mat-form-field>
          <br>
          <mat-form-field appearance="fill" class="w-2/6">
            <mat-label>Einsatzort</mat-label>
            <input matInput required>
          </mat-form-field>
    </form>
    
</div>
